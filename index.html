<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Red Balls Pro</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; overflow: hidden;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff; position: fixed; width: 100%; height: 100%;
      transition: background 0.5s; touch-action: none;
    }
    .particle {
      position: absolute; border-radius: 50%; pointer-events: none;
      background: rgba(255,255,255,0.2); animation: particleMove linear forwards;
    }
    @keyframes particleMove {
      0%{opacity:0;transform:translateY(0) scale(0.5);}
      50%{opacity:0.5;}
      100%{opacity:0;transform:translateY(-200px) scale(1);}
    }
    .info {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; padding: 5px 10px; border-radius: 30px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      font-size: 12px; font-weight: 700; color: #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
      transition: box-shadow 0.3s; white-space: nowrap;
    }
    .info span {
      display: flex; align-items: center; gap: 3px; padding: 4px 7px;
      border-radius: 15px; background: linear-gradient(145deg, #1f1f1f, #3a3a3a);
      box-shadow: 1px 1px 5px rgba(0,0,0,0.4);
    }
    .info span .icon { font-size: 12px; }

    .powerup-bar {
      position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 14px; padding: 10px 18px; border-radius: 35px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000;
    }
    .pu-btn {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1); cursor: pointer; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; position: relative;
    }
    .pu-btn:active { transform: scale(0.88); }
    .pu-btn.active { border-color: #ffd700; background: rgba(255,215,0,0.25); box-shadow: 0 0 15px #ffd700; }
    .pu-btn.disabled { opacity: 0.3; }
    .pu-count {
      position: absolute; top: -5px; right: -5px; background: #ff4d4d;
      border-radius: 50%; width: 20px; height: 20px; font-size: 11px;
      display: flex; align-items: center; justify-content: center; font-weight: bold;
    }

    .ball {
      position: absolute; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      opacity: 0; animation: ballAppear 0.25s forwards; user-select: none;
      touch-action: manipulation;
      width: clamp(62px, 13vw, 78px);
      height: clamp(62px, 13vw, 78px);
      font-size: clamp(26px, 5.5vw, 34px);
    }
    .ball:active { transform: scale(0.88) !important; }
    @media (hover: hover) { .ball:hover { transform: scale(1.2) !important; } }

    /* ===== SKINS ===== */
    .skin-classic  .red    { background: radial-gradient(circle at 35% 35%, #ff7070, #cc0000); }
    .skin-classic  .green  { background: radial-gradient(circle at 35% 35%, #70ff70, #009900); }
    .skin-classic  .golden { background: radial-gradient(circle at 35% 35%, #ffe066, #cc8800); }
    .skin-classic  .bomb   { background: radial-gradient(circle at 35% 35%, #555, #111); }
    .skin-classic  .fast-ball { background: radial-gradient(circle at 35% 35%, #ff44ff, #880088); }

    .skin-neon .red    { background: radial-gradient(circle at 35% 35%, #ff0088, #aa0055); box-shadow: 0 0 15px #ff0088; }
    .skin-neon .green  { background: radial-gradient(circle at 35% 35%, #00ffaa, #00aa66); box-shadow: 0 0 15px #00ffaa; }
    .skin-neon .golden { background: radial-gradient(circle at 35% 35%, #ffff00, #aaaa00); box-shadow: 0 0 15px #ffff00; }
    .skin-neon .bomb   { background: radial-gradient(circle at 35% 35%, #ff4400, #880000); box-shadow: 0 0 15px #ff4400; }
    .skin-neon .fast-ball { background: radial-gradient(circle at 35% 35%, #aa00ff, #5500aa); box-shadow: 0 0 15px #aa00ff; }

    .skin-pastel .red    { background: radial-gradient(circle at 35% 35%, #ffaaaa, #ff6666); }
    .skin-pastel .green  { background: radial-gradient(circle at 35% 35%, #aaffcc, #66cc88); }
    .skin-pastel .golden { background: radial-gradient(circle at 35% 35%, #ffffaa, #ddcc66); }
    .skin-pastel .bomb   { background: radial-gradient(circle at 35% 35%, #aaaacc, #666688); }
    .skin-pastel .fast-ball { background: radial-gradient(circle at 35% 35%, #ffaaff, #cc66cc); }

    .skin-fire .red    { background: radial-gradient(circle at 35% 35%, #ffdd00, #ff4400); }
    .skin-fire .green  { background: radial-gradient(circle at 35% 35%, #ff8800, #cc4400); }
    .skin-fire .golden { background: radial-gradient(circle at 35% 35%, #ffffff, #ffdd88); }
    .skin-fire .bomb   { background: radial-gradient(circle at 35% 35%, #440000, #220000); }
    .skin-fire .fast-ball { background: radial-gradient(circle at 35% 35%, #ff0000, #880000); }

    .powerup-ball { background: radial-gradient(circle at 35% 35%, #aa66ff, #5500cc); }
    .ghost-ball { transition: opacity 3s linear !important; }
    @keyframes ballAppear {0%{opacity:0;transform:scale(0.4);}100%{opacity:1;transform:scale(1);}}

    .trail {
      position: absolute; border-radius: 50%; pointer-events: none;
      animation: trailFade 0.4s forwards;
    }
    @keyframes trailFade { 0%{opacity:0.5;} 100%{opacity:0;transform:scale(0.3);} }

    .popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20,20,30,0.98); padding: 22px 26px; border-radius: 20px;
      text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      color: #fff; z-index: 2000; animation: fadeIn 0.4s ease;
      width: min(92vw, 360px); max-height: 90vh; overflow-y: auto;
    }
    .popup h2 { margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); color: #ffb347; }
    .popup p  { font-size: clamp(12px, 3.5vw, 15px); margin: 5px 0; }
    .popup .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: clamp(12px, 3.5vw, 14px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .popup .stat-row:last-child { border: none; }
    .popup button {
      margin: 5px 3px 0; padding: 11px 16px; font-size: clamp(12px, 3.5vw, 14px); border: none;
      border-radius: 14px; background: linear-gradient(135deg, #ff4d4d, #ff9966);
      color: white; cursor: pointer; min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .popup button:active { opacity: 0.85; transform: scale(0.97); }
    .popup button.secondary { background: linear-gradient(135deg, #4488ff, #44aaff); }
    .popup button.third     { background: linear-gradient(135deg, #44bb44, #88dd44); }
    .popup button.fourth    { background: linear-gradient(135deg, #8844ff, #aa66ff); }
    .popup input {
      width: 100%; padding: 12px 14px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1); color: #fff; font-size: 16px;
      outline: none; text-align: center; margin-bottom: 8px; -webkit-appearance: none;
    }
    .popup input:focus { border-color: rgba(255,180,71,0.6); }

    @keyframes fadeIn {0%{opacity:0;transform:translate(-50%,-55%);}100%{opacity:1;transform:translate(-50%,-50%);}}

    .explosion {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      pointer-events: none; animation: explode 0.4s ease-out forwards;
    }
    @keyframes explode {0%{transform:scale(1);opacity:1;}100%{transform:scale(2.8);opacity:0;}}

    .chain-ring {
      position: absolute; border-radius: 50%; pointer-events: none;
      border: 3px solid #00ffcc; animation: chainExpand 0.5s ease-out forwards;
    }
    @keyframes chainExpand {0%{transform:scale(0);opacity:1;}100%{transform:scale(4);opacity:0;}}

    .combo-fire { position: absolute; pointer-events: none; animation: flameUp 0.8s forwards; }
    @keyframes flameUp {
      0%{transform:translateY(0) scale(0.5);opacity:1;}
      50%{transform:translateY(-20px) scale(1.2);opacity:1;}
      100%{transform:translateY(-40px) scale(0.8);opacity:0;}
    }
    .score-float {
      position: absolute; font-size: 18px; font-weight: bold; pointer-events: none;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.8); animation: floatScore 0.9s forwards; white-space: nowrap;
    }
    @keyframes floatScore {0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-65px) scale(1.4);}}

    .shake { animation: shake 0.3s; }
    @keyframes shake {0%{transform:translate(0);}25%{transform:translate(6px,-6px);}50%{transform:translate(-6px,6px);}75%{transform:translate(6px,6px);}100%{transform:translate(0);}}

    .shield-flash {
      position: fixed; top:0;left:0;right:0;bottom:0;
      background: rgba(100,200,255,0.18); pointer-events: none;
      animation: shieldFade 0.5s forwards; z-index: 500;
    }
    @keyframes shieldFade {0%{opacity:1;}100%{opacity:0;}}

    .slow-overlay {
      position: fixed; top:0;left:0;right:0;bottom:0; pointer-events: none;
      border: 4px solid rgba(100,200,255,0.45); z-index: 499;
      animation: borderPulse 1s infinite alternate;
    }
    @keyframes borderPulse {0%{border-color:rgba(100,200,255,0.2);}100%{border-color:rgba(100,200,255,0.7);}}

    .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .leaderboard-table td { padding: 5px 6px; font-size: 12px; }
    .leaderboard-table tr:first-child td { color: #ffd700; }

    #survival-warning {
      position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
      background: rgba(255,50,50,0.9); padding: 5px 16px; border-radius: 20px;
      font-size: 13px; font-weight: bold; display: none; z-index: 1001;
      animation: warningPulse 0.5s infinite alternate; white-space: nowrap;
    }
    @keyframes warningPulse {0%{opacity:0.7;}100%{opacity:1;}}

    #menu-btn {
      position: fixed; top: 12px; right: 12px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border: none; border-radius: 20px; color: #fff;
      padding: 8px 13px; font-size: 13px; cursor: pointer; z-index: 1000; min-height: 36px;
    }
    #menu-btn:active { background: rgba(255,80,80,0.5); }

    #accuracy-display {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border-radius: 20px; color: #fff; padding: 7px 12px;
      font-size: 12px; font-weight: 700; z-index: 1000; display: none;
    }

    .blitz-bar-wrap {
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      width: min(280px, 80vw); height: 8px; background: rgba(255,255,255,0.15);
      border-radius: 10px; z-index: 1000; overflow: hidden; display: none;
    }
    #blitz-bar { height: 100%; width: 100%; transition: width 0.1s linear; }

    .toast {
      position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 25px; font-size: 14px; font-weight: bold;
      z-index: 1500; white-space: nowrap; animation: toastIn 3s forwards;
    }
    .toast.achievement { background: linear-gradient(135deg, #ffd700, #ff8800); color: #1a0a00; }
    .toast.daily { background: linear-gradient(135deg, #00ccff, #0055ff); color: #fff; }
    @keyframes toastIn {
      0%{opacity:0;transform:translateX(-50%) translateY(20px);}
      10%{opacity:1;transform:translateX(-50%) translateY(0);}
      80%{opacity:1;}
      100%{opacity:0;transform:translateX(-50%) translateY(-10px);}
    }

    /* sound toggle */
    #sound-btn {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border: none; border-radius: 20px; color: #fff;
      padding: 7px 12px; font-size: 16px; cursor: pointer; z-index: 1001; min-height: 36px;
      display: none;
    }

    /* skin preview */
    .skin-card {
      display: inline-flex; flex-direction: column; align-items: center;
      margin: 6px; padding: 10px 14px; border-radius: 14px;
      background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: all 0.2s; min-width: 70px;
    }
    .skin-card:active { transform: scale(0.93); }
    .skin-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.15); }
    .skin-preview { width: 36px; height: 36px; border-radius: 50%; margin-bottom: 5px; }
    .skin-label { font-size: 11px; color: #ccc; }

    /* daily challenge bar */
    #daily-bar-wrap {
      position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 20px;
      font-size: 11px; z-index: 999; display: none; white-space: nowrap;
      backdrop-filter: blur(6px);
    }
    #daily-progress-bar {
      height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 3px;
      overflow: hidden;
    }
    #daily-progress-fill {
      height: 100%; background: linear-gradient(90deg,#00ccff,#0055ff);
      border-radius: 4px; transition: width 0.3s;
    }
  </style>
</head>

<script>
// ===== SUPABASE =====
const SB_URL = "https://msqaslhfeytjwatwgvsf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zcWFzbGhmZXl0andhdHdndnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjA3OTYsImV4cCI6MjA5MDEzNjc5Nn0.DJEIGgrHHyzKFnPt6UnmJEHS0H-Yusr1nSf18qtgIAc";
async function sbInsert(name,sc,md,ac){try{await fetch(`${SB_URL}/rest/v1/leaderboard`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},body:JSON.stringify({name,score:sc,mode:md,acc:ac})});}catch(e){}}
async function sbFetch(){try{const r=await fetch(`${SB_URL}/rest/v1/leaderboard?select=name,score,mode,acc&order=score.desc&limit=10`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});return await r.json();}catch(e){return[];}}

// ===== SOUND ENGINE =====
const AC = window.AudioContext || window.webkitAudioContext ? new (window.AudioContext||window.webkitAudioContext)() : null;
let soundOn = JSON.parse(localStorage.getItem("rbSound") ?? "true");

function playSound(type) {
  if (!soundOn || !AC) return;
  try {
    if (AC.state === "suspended") AC.resume();
  } catch(e) { return; }

  const t = AC.currentTime;

  const note = (freq, startT, dur, vol=0.22) => {
    try {
      const o = AC.createOscillator();
      const g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.frequency.setValueAtTime(freq, startT);
      g.gain.setValueAtTime(vol, startT);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
      o.start(startT);
      o.stop(startT + dur + 0.01);
    } catch(e) {}
  };

  try {
    if (type === "bomb") {
      const buf = AC.createBuffer(1, Math.floor(AC.sampleRate * 0.18), AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
      const s = AC.createBufferSource();
      const g = AC.createGain();
      s.buffer = buf; s.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(0.35, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      s.start(t); s.stop(t + 0.19);
    } else if (type === "pop")    { note(600,t,0.08); note(300,t+0.04,0.06,0.15); }
    else if (type === "green")   { note(900,t,0.06); note(1200,t+0.05,0.08,0.18); }
    else if (type === "golden")  { note(600,t,0.14,0.18); note(800,t+0.04,0.14,0.18); note(1000,t+0.08,0.14,0.18); }
    else if (type === "combo")   { const f=400+Math.min(combo,10)*70; note(f,t,0.1,0.18); note(f*1.4,t+0.05,0.1,0.14); }
    else if (type === "level")   { [523,659,784,1047].forEach((f,i)=>note(f,t+i*0.1,0.18,0.2)); }
    else if (type === "daily")   { [400,550,750,950].forEach((f,i)=>note(f,t+i*0.08,0.16,0.18)); }
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  localStorage.setItem("rbSound", JSON.stringify(soundOn));
  document.getElementById("sound-btn").textContent = soundOn ? "🔊" : "🔇";
}

// sound btn touch fix
const _sb=document.getElementById("sound-btn");
let _sbTouched=false;
_sb.addEventListener("touchstart",e=>e.preventDefault(),{passive:false});
_sb.addEventListener("touchend",e=>{e.preventDefault();_sbTouched=true;toggleSound();setTimeout(()=>_sbTouched=false,300);},{passive:false});
_sb.addEventListener("click",()=>{if(!_sbTouched)toggleSound();});

// ===== PROFILE =====
let profile = JSON.parse(localStorage.getItem("rbProfile") || "null");

function getProfile() { return profile; }

function showProfileSetup(onDone) {
  clearScreen();
  const d = document.createElement("div"); d.className = "popup";
  d.innerHTML = `
    <h2>👤 პროფილი</h2>
    <p style="color:#aaa;font-size:13px;margin-bottom:14px">ერთხელ შეიყვანე სახელი — ყოველთვის ახსოვს</p>
    <input id="prof-name" type="text" maxlength="20" placeholder="შენი სახელი" autocomplete="off" autocorrect="off" spellcheck="false">
    <br>
    <button onclick="saveProfile('${onDone}')">✅ შენახვა</button>
  `;
  document.body.appendChild(d);
  setTimeout(()=>document.getElementById("prof-name")?.focus(),300);
}

function saveProfile(onDone) {
  const name = document.getElementById("prof-name")?.value.trim();
  if (!name) { document.getElementById("prof-name").style.borderColor="#ff4444"; return; }
  profile = { name };
  localStorage.setItem("rbProfile", JSON.stringify(profile));
  clearScreen();
  if (onDone === "menu") showMenu();
  else initGame(onDone);
}

// ===== SKINS =====
const SKINS = [
  { id:"classic", label:"Classic", color:"#cc0000" },
  { id:"neon",    label:"Neon",    color:"#ff0088" },
  { id:"pastel",  label:"Pastel",  color:"#ff6666" },
  { id:"fire",    label:"Fire",    color:"#ff4400" },
];
let currentSkin = localStorage.getItem("rbSkin") || "classic";

function applySkin() {
  document.body.classList.remove(...SKINS.map(s=>"skin-"+s.id));
  document.body.classList.add("skin-"+currentSkin);
}

function showSkins() {
  clearScreen();
  const cards = SKINS.map(s=>`
    <div class="skin-card ${s.id===currentSkin?"selected":""}" onclick="selectSkin('${s.id}')">
      <div class="skin-preview" style="background:radial-gradient(circle at 35% 35%, ${s.color}cc, ${s.color})"></div>
      <div class="skin-label">${s.label}</div>
    </div>
  `).join("");
  const d = document.createElement("div"); d.className="popup";
  d.innerHTML = `<h2>🎨 სკინები</h2><div style="display:flex;flex-wrap:wrap;justify-content:center;margin:10px 0">${cards}</div><br><button onclick="showMenu()">🏠 მენიუ</button>`;
  document.body.appendChild(d);
}

function selectSkin(id) {
  currentSkin = id;
  localStorage.setItem("rbSkin", id);
  applySkin();
  showSkins();
}

// ===== DAILY CHALLENGE =====
const DAILY_CHALLENGES = [
  { id:"score100",   label:"100 ქულა გაიღე",         check:(s,st)=>s.score>=100 },

function getTodayKey() { return "daily_"+new Date().toISOString().slice(0,10); }
function getDailyChallenge() {
  const key = getTodayKey();
  let saved = JSON.parse(localStorage.getItem(key)||"null");
  const seed = new Date().toISOString().slice(0,10).replace(/-/g,"");
  const idx = parseInt(seed) % DAILY_CHALLENGES.length;
  const template = DAILY_CHALLENGES[idx];
  if (!saved) {
    saved = { id: template.id, label: template.label, done: false };
    localStorage.setItem(key, JSON.stringify(saved));
  }
  // always attach check function from template (not from localStorage)
  return { ...saved, check: template.check };
}

function checkDailyChallenge(gameResult, stats) {
  const key = getTodayKey();
  const ch = getDailyChallenge();
  if (ch.done) return;
  if (ch.check(gameResult, stats)) {
    ch.done = true;
    localStorage.setItem(key, JSON.stringify(ch));
    playSound("daily");
    showToast("📅 Daily Challenge დასრულდა! +50 ბონუს ქულა", "daily");
    return 50;
  }
  return 0;
}

// ===== BALL TYPE =====
function getType(){
  const r=Math.random();
  if(r<0.04) return"powerup-ball";
  if(r<0.09) return"golden";
  if(r<0.15) return"fast-ball";
  if(r<0.25) return"bomb";
  if(r<0.55) return"green";
  return"red";
}
const FACES={red:"😡",green:"😊",bomb:"💣",golden:"⭐","powerup-ball":"🎁","fast-ball":"💨"};

// ===== CREATE BALL =====
function createBall(){
  if(!gameActive)return;
  const ball=document.createElement("div");
  const type=getType();
  ball.classList.add("ball",type);
  ball.textContent=FACES[type]||"";

  const margin=70;
  let px=margin+Math.random()*(window.innerWidth-margin*2);
  let py=margin+Math.random()*(window.innerHeight-margin*2);
  ball.style.left=px+"px";ball.style.top=py+"px";

  if(mode==="ghost"){
    ball.classList.add("ghost-ball");
    const delay=1500+Math.random()*1500;
    setTimeout(()=>{if(ball.parentNode)ball.style.opacity="0";},delay);
  }

  let spd=type==="fast-ball"?ballSpeed*3:ballSpeed;
  let vx=(Math.random()-0.5)*spd*2;
  let vy=(Math.random()-0.5)*spd*2;
  if(Math.abs(vx)<0.3)vx=0.3*Math.sign(vx||1);
  if(Math.abs(vy)<0.3)vy=0.3*Math.sign(vy||1);

  let clicked=false;

  ball.addEventListener("pointerdown", e=>{
    e.preventDefault();
    if(clicked) return;
    clicked=true;
    handleClick(type, ball);
  }, {passive:false});
  ball.addEventListener("contextmenu", e=>e.preventDefault());
  document.body.appendChild(ball);

  const lifetime=type==="fast-ball"?900:Math.max(1200,2500-level*120);
  setTimeout(()=>{
    if(!clicked&&ball.parentNode){
      ball.remove();removeBallRef(ball);
      if(type!=="bomb"&&type!=="powerup-ball"){combo=0;totalClicks++;updateUI();updateAccuracy();}
      if(gameActive)createBall();
    }
  },lifetime);

  const obj={el:ball,px,py,vx,vy,type,clicked:()=>clicked};
  activeBalls.push(obj);
  moveBall(obj);
}

function moveBall(obj){
  if(!gameActive||obj.clicked())return;
  const spd=activePowerups.slow?0.25:1;
  obj.px+=obj.vx*spd; obj.py+=obj.vy*spd;
  const W=window.innerWidth-65,H=window.innerHeight-65;
  if(obj.px<0){obj.px=0;obj.vx*=-1;}
  if(obj.px>W){obj.px=W;obj.vx*=-1;}
  if(obj.py<0){obj.py=0;obj.vy*=-1;}
  if(obj.py>H){obj.py=H;obj.vy*=-1;}
  if(obj.el.parentNode){obj.el.style.left=obj.px+"px";obj.el.style.top=obj.py+"px";spawnTrail(obj);}
  if(!obj.clicked()){const af=requestAnimationFrame(()=>moveBall(obj));animFrames.push(af);}
}

let trailTick=0;
function spawnTrail(obj){
  trailTick++;if(trailTick%4!==0)return;
  const t=document.createElement("div");t.className="trail";
  const sz=20+Math.random()*14;
  t.style.width=sz+"px";t.style.height=sz+"px";
  t.style.left=(obj.px+22)+"px";t.style.top=(obj.py+22)+"px";
  const colors={red:"rgba(220,50,50,0.5)",green:"rgba(50,200,50,0.5)",bomb:"rgba(100,100,100,0.4)",golden:"rgba(255,200,0,0.6)","fast-ball":"rgba(220,50,220,0.5)","powerup-ball":"rgba(150,50,250,0.5)"};
  t.style.background=colors[obj.type]||"rgba(255,255,255,0.3)";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),400);
}

function removeBallRef(el){const i=activeBalls.findIndex(b=>b.el===el);if(i!==-1)activeBalls.splice(i,1);}

// ===== HANDLE CLICK =====
function handleClick(type,ball){
  if(!gameActive)return;
  const rect=ball.getBoundingClientRect();
  totalClicks++;

  if(type==="powerup-ball"){
    const pus=["slow","magnet","shield"];
    const pu=pus[Math.floor(Math.random()*3)];
    powerupCounts[pu]=Math.min(powerupCounts[pu]+1,3);
    updatePowerupUI();
    playSound("golden");
    createExplosion(rect.left,rect.top,"#aa66ff");
    createScoreFloat(rect.left,rect.top,"🎁 +PU!",null);
    ball.remove();removeBallRef(ball);createBall();return;
  }

  const now=Date.now();
  if(now-lastClick<700)combo++;else combo=0;
  if(lastHitTime>0&&type!=="bomb"){const gap=now-lastHitTime;if(gap<fastestClick)fastestClick=gap;}
  lastClick=now;
  if(type!=="bomb")lastHitTime=now;
  if(combo>biggestCombo)biggestCombo=combo;

  let mult=1;
  if(combo>=3)mult=1.2;
  if(combo>=5)mult=1.5;
  if(combo>=10)mult=2.0;

  let points=0;
  if(type==="red")points=1;
  if(type==="green")points=3;
  if(type==="golden"){points=8;goldenHits++;}
  if(type==="fast-ball"){points=10;fastHits++;}

  if(type==="bomb"){
    bombHits++;
    if(activePowerups.shield){
      activePowerups.shield=false;updatePowerupUI();flashShield();
      createScoreFloat(rect.left,rect.top,"🛡️ BLOCKED!",null);
      playSound("pop");
    } else if(mode==="survival"){
      lives--;livesEl.textContent=lives;shakeScreen();
      createScoreFloat(rect.left,rect.top,"💔 -1 life",null);
      setScreenTint("rgba(255,0,0,0.15)");playSound("bomb");
      if(lives<=0){ball.remove();removeBallRef(ball);gameActive=false;endGame();return;}
      points=0;
    } else {
      points=-8;shakeScreen();setScreenTint("rgba(255,0,0,0.12)");playSound("bomb");
    }
  } else {
    totalHits++;
    if(type==="green"){playSound("green");triggerChain(rect.left+33,rect.top+33);}
    else if(type==="golden")playSound("golden");
    else{playSound("pop");if(combo>0)playSound("combo");}
  }

  score+=Math.floor((points+combo)*mult);
  if(type!=="bomb")ballsHit++;

  updateDailyProgress();
  const expColor=type==="golden"?"#ffd700":type==="green"?"#44ff44":type==="fast-ball"?"#ff44ff":"#ff5500";
  createExplosion(rect.left,rect.top,expColor);
  if(points!==0||combo>0)createScoreFloat(rect.left,rect.top,points,combo,mult);
  ball.remove();removeBallRef(ball);
  updateUI();updateAccuracy();showComboFlame();comboPowerEffect();setComboScreenColor();
  checkAchievements();
  if(mode==="ghost"&&type==="golden")checkAchievements("ghost_hunter");
  if(mode==="normal"&&ballsHit>=25+level*5)nextLevel();
  else createBall();
}

// daily progress visual update
function updateDailyProgress(){
  const ch=getDailyChallenge();if(ch.done)return;
  let pct=0;
  if(ch.id==="score100")pct=Math.min(100,score);
  else if(ch.id==="combo8")pct=Math.min(100,biggestCombo/8*100);
  else if(ch.id==="golden3")pct=Math.min(100,goldenHits/3*100);
  else if(ch.id==="fast5")pct=Math.min(100,fastHits/5*100);
  else if(ch.id==="nobomb")pct=bombHits===0?50:0;
  else if(ch.id==="acc80"){const a=totalClicks>0?Math.round(totalHits/totalClicks*100):0;pct=Math.min(100,a/80*100);}
  dailyFill.style.width=pct+"%";
}

// ===== CHAIN REACTION =====
function triggerChain(cx,cy){
  const radius=130;
  const nearby=activeBalls.filter(obj=>{
    if(obj.clicked())return false;
    const d=Math.sqrt((obj.px+33-cx)**2+(obj.py+33-cy)**2);
    return d<radius&&!["bomb","powerup-ball"].includes(obj.type);
  });
  if(!nearby.length)return;
  const ring=document.createElement("div");ring.className="chain-ring";
  ring.style.cssText=`width:66px;height:66px;left:${cx-33}px;top:${cy-33}px`;
  document.body.appendChild(ring);setTimeout(()=>ring.remove(),500);
  nearby.forEach(obj=>{setTimeout(()=>{if(!obj.clicked()&&obj.el.parentNode)obj.el.click();},80);});
  if(nearby.length>=2){checkAchievements("chain_master");createScoreFloat(cx,cy,"🔗 CHAIN x"+nearby.length+"!",null);}
}

// ===== POWERUPS =====
function usePowerup(type){
  if(powerupCounts[type]<=0||!gameActive)return;
  if(AC&&AC.state==="suspended")AC.resume();
  powerupCounts[type]--;
  if(type==="slow"){
    activePowerups.slow=true;
    if(!slowOverlay){slowOverlay=document.createElement("div");slowOverlay.className="slow-overlay";document.body.appendChild(slowOverlay);}
    setTimeout(()=>{activePowerups.slow=false;if(slowOverlay){slowOverlay.remove();slowOverlay=null;}updatePowerupUI();},5000);
  }
  if(type==="magnet"){
    activePowerups.magnet=true;
    [...activeBalls].forEach(obj=>{if(!obj.clicked()&&obj.el.parentNode&&obj.type!=="bomb")setTimeout(()=>obj.el.click(),50);});
    setTimeout(()=>{activePowerups.magnet=false;updatePowerupUI();},300);
  }
  if(type==="shield"){activePowerups.shield=true;}
  updatePowerupUI();
  playSound("pop");
}

function updatePowerupUI(){
  ["slow","magnet","shield"].forEach(t=>{
    const btn=document.getElementById("pu-"+t);
    document.getElementById("pu-"+t+"-count").textContent=powerupCounts[t];
    btn.classList.toggle("disabled",powerupCounts[t]<=0);
    if(t==="shield")btn.classList.toggle("active",activePowerups.shield);
    if(t==="slow")btn.classList.toggle("active",activePowerups.slow);
  });
}
function flashShield(){const d=document.createElement("div");d.className="shield-flash";document.body.appendChild(d);setTimeout(()=>d.remove(),500);}

// ===== LEVEL UP =====
function nextLevel(){
  level++;ballsHit=0;timeLeft+=10;ballSpeed+=0.2;
  spawnSpeed=Math.max(250,spawnSpeed-50);
  powerupCounts.slow=Math.min(powerupCounts.slow+1,3);
  playSound("level");
  showPopup(`⚡ Level ${level}!`);updateUI();updatePowerupUI();
  setTimeout(()=>createBall(),1000);
}

// ===== END GAME =====
function endGame(){
  gameActive=false;
  clearInterval(survivalTimer);clearInterval(blitzInterval);
  survWarn.style.display="none";dailyBarWrap.style.display="none";
  const acc=totalClicks>0?Math.round(totalHits/totalClicks*100):100;

  // check daily
  const stats={biggestCombo,acc,goldenHits,fastHits,bombHits};
  const bonusPoints=checkDailyChallenge({score,mode,level},stats)||0;
  if(bonusPoints>0){score+=bonusPoints;checkAchievements("daily_done");}

  scores.push({score,level,mode,acc});
  if(scores.length>20)scores.shift();
  localStorage.setItem("rbScores",JSON.stringify(scores));
  if(score>bestScore)bestScore=score;
  bestEl.textContent=bestScore;
  document.body.style.background="linear-gradient(135deg,#0f0c29,#302b63,#24243e)";

  const modeLabel={normal:"🎮 Normal",aim:"🎯 Aim",survival:"💀 Survival",ghost:"👻 Ghost",blitz:"⚡ Blitz"};
  const ch=getDailyChallenge();
  const d=document.createElement("div");d.className="popup";
  d.innerHTML=`
    <h2>Game Over</h2>
    <p style="color:#aaa;font-size:12px;margin-bottom:8px">${modeLabel[mode]||mode}</p>
    <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 14px;margin-bottom:10px">
      <div class="stat-row"><span>🎯 ქულა</span><span><b>${score}</b>${bonusPoints?` <span style="color:#00ccff;font-size:11px">(+${bonusPoints} daily)</span>`:""}</span></div>
      <div class="stat-row"><span>🧩 Level</span><span>${level}</span></div>
      <div class="stat-row"><span>🎯 Accuracy</span><span>${acc}%</span></div>
      <div class="stat-row"><span>🔥 Max Combo</span><span>x${biggestCombo}</span></div>
      <div class="stat-row"><span>⚡ Fastest</span><span>${fastestClick===9999?"—":fastestClick+"ms"}</span></div>
      <div class="stat-row"><span>🏆 Best</span><span>${bestScore}</span></div>
    </div>
    ${!ch.done?`
    <div style="margin-bottom:10px">
      <p style="font-size:12px;color:#aaa;margin-bottom:6px">📅 ${ch.label}</p>
    </div>`:""}
    <div style="margin-bottom:10px">
      <input id="player-name" type="text" maxlength="20" placeholder="სახელი Leaderboard-ზე"
        value="${profile?.name||""}" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="submit-btn" onclick="submitScore(${score},'${mode}',${acc})" style="width:100%">🌍 გამოქვეყნება</button>
    </div>
    <button onclick="restartGame()">🔁 Restart</button>
    <button class="secondary" onclick="showLeaderboard()">📊 Scores</button>
    <button class="third" onclick="returnToMenu()">🏠 Menu</button>
  `;
  document.body.appendChild(d);
}

async function submitScore(sc,md,ac){
  const nameEl=document.getElementById("player-name");
  const btn=document.getElementById("submit-btn");
  const name=nameEl.value.trim();
  if(!name){nameEl.style.borderColor="#ff4444";return;}
  if(profile)profile.name=name,localStorage.setItem("rbProfile",JSON.stringify(profile));
  btn.textContent="⏳ იგზავნება...";btn.disabled=true;
  await sbInsert(name,sc,md,ac);
  btn.textContent="✅ გამოქვეყნდა!";
  btn.style.background="linear-gradient(135deg,#44bb44,#88dd44)";
}

function restartGame(){stopAll();initGame(mode);}
function confirmMenu(){stopAll();showMenu();}
function returnToMenu(){stopAll();showMenu();}

function stopAll(){
  gameActive=false;
  clearInterval(survivalTimer);clearInterval(blitzInterval);
  animFrames.forEach(af=>cancelAnimationFrame(af));
  animFrames=[];activeBalls=[];
  survWarn.style.display="none";menuBtn.style.display="none";
  soundBtn.style.display="none";livesDisp.style.display="none";
  accDisp.style.display="none";blitzWrap.style.display="none";
  dailyBarWrap.style.display="none";
  if(slowOverlay){slowOverlay.remove();slowOverlay=null;}
}

// ===== UI =====
function updateUI(){
  scoreEl.textContent=score;
  if(mode!=="survival")timeEl.textContent=timeLeft;
  levelEl.textContent=level;comboEl.textContent=combo;
}
function clearScreen(){
  document.querySelectorAll(".ball,.popup,.combo-fire,.score-float,.particle,.explosion,.shield-flash,.trail,.chain-ring,.toast").forEach(e=>e.remove());
  activeBalls=[];animFrames.forEach(af=>cancelAnimationFrame(af));animFrames=[];
}
function showPopup(text){
  const d=document.createElement("div");d.className="popup";d.innerHTML=`<h2>${text}</h2>`;
  document.body.appendChild(d);setTimeout(()=>d.remove(),1100);
}
function showToast(text,type="achievement"){
  const t=document.createElement("div");t.className=`toast ${type}`;t.textContent=text;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ===== VISUALS =====
function createExplosion(x,y,color="#ff5500"){
  const e=document.createElement("div");e.className="explosion";
  e.style.left=x+"px";e.style.top=y+"px";
  e.style.background=`radial-gradient(circle,#ffdd00,${color})`;
  document.body.appendChild(e);setTimeout(()=>e.remove(),400);
}
function createScoreFloat(x,y,points,combo,mult){
  const f=document.createElement("div");f.className="score-float";
  if(typeof points==="string"||combo===null){f.textContent=points;f.style.color="#00ffcc";}
  else{const val=Math.floor((points+combo)*mult);f.textContent=(val>=0?"+":"")+val;f.style.color=val>=8?"#ffd700":val>=0?"#ffff00":"#ff4444";}
  f.style.left=x+"px";f.style.top=y+"px";
  document.body.appendChild(f);setTimeout(()=>f.remove(),900);
}
function showComboFlame(){
  if(combo<=0)return;
  const rect=comboEl.getBoundingClientRect();
  const n=Math.min(combo,7);
  for(let i=0;i<n;i++){
    const fl=document.createElement("div");fl.className="combo-fire";fl.textContent="🔥";
    let sz=14+combo*3;fl.style.fontSize=sz+"px";
    fl.style.color=combo<=2?"#ff8c00":combo<=5?"#ffd700":"#ff4500";
    fl.style.left=rect.left+rect.width/2-sz/2+"px";fl.style.top=rect.top-16-i*10+"px";
    fl.style.animationDelay=(i*0.05)+"s";
    document.body.appendChild(fl);setTimeout(()=>fl.remove(),800);
  }
}
function comboPowerEffect(){
  if(combo<5)return;
  document.body.classList.add("shake");setTimeout(()=>document.body.classList.remove("shake"),350);
  const info=document.querySelector(".info");
  info.style.boxShadow="0 0 25px 5px #ff4500,0 0 45px 12px #ffd700";
  setTimeout(()=>info.style.boxShadow="0 4px 15px rgba(0,0,0,0.5)",450);
}
function shakeScreen(){document.body.classList.add("shake");setTimeout(()=>document.body.classList.remove("shake"),300);}

// ===== PARTICLES =====
function spawnParticles(){
  for(let i=0;i<18;i++){
    const p=document.createElement("div");p.className="particle";
    let s=Math.random()*4+2;p.style.width=s+"px";p.style.height=s+"px";
    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.top=window.innerHeight+Math.random()*200+"px";
    p.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
  if(gameActive)setTimeout(spawnParticles,1200);
}

applySkin();
showMenu();
document.addEventListener("touchmove", e => {
  if (!e.target.closest(".popup")) e.preventDefault();
}, {passive:false});
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
